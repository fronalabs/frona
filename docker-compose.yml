services:
  browserless:
    image: ghcr.io/browserless/chromium:latest
    ports:
      - "3333:3333"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - PREBOOT_CHROME=true
      - ENABLE_DEBUGGER=true
      - PORT=3333
      - TIMEOUT=1800000
    volumes:
      - ./data/browser_profiles:/profiles
    restart: unless-stopped

  searxng:
    image: searxng/searxng:2026.2.16-8e824017d
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    volumes:
      - ./data/searxng:/etc/searxng
    restart: unless-stopped

  frona-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
      - "3000:3000"
    volumes:
      - ./engine:/app/engine
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo-cache:/app/target
      - node-modules:/app/frontend/node_modules
      - ./frontend:/app/frontend
      - ./data:/app/data
      - ./data/browser_profiles:/profiles
    environment:
      - ANTHROPIC_API_KEY
      - FRONA_SERVER_CORS_ORIGINS
      - NEXT_PUBLIC_API_URL
      - FRONA_AUTH_ENCRYPTION_SECRET=dev-secret-change-in-production
      - RUST_LOG=frona=debug,tower_http=debug
      - FRONA_BROWSER_WS_URL=ws://browserless:3333
      - FRONA_SEARCH_SEARXNG_BASE_URL=http://searxng:8080
      - FRONA_DATABASE_PATH=data/db
      - FRONA_SERVER_PORT=3001
      - CARGO_BUILD_JOBS=4
      - WATCHPACK_POLLING=true
    depends_on: [browserless, searxng]
    restart: unless-stopped

volumes:
  cargo-cache:
  node-modules:
